<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<!-- LOGIN -->
<div id="login" class="card">
    <h2>Gracze</h2>
    <input type="text" id="playerX" placeholder="Gracz X">
    <input type="text" id="playerO" placeholder="Gracz O">
    <button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="game" class="card" style="display:none;">

    <div id="status">Tura: X</div>

    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>

    <div class="buttons">
        <button onclick="restartGame()">Restart</button>
        <button onclick="resetScore()">Reset wyników</button>
    </div>

    <div class="score-box">
        <h3>Wyniki</h3>
        <p id="scoreX">X: 0</p>
        <p id="scoreO">O: 0</p>
    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
