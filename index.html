<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tic Tac Toe</h1>

<!-- ЛОГИН -->
<div id="login">
    <h2>Logowanie</h2>
    <input type="text" id="playerX" placeholder="Gracz X">
    <input type="text" id="playerO" placeholder="Gracz O">
    <button onclick="startGame()">Start</button>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">

    <div id="status">Tura: X</div>

    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>

    <button onclick="restartGame()">Restart</button>

    <h2>Historia wyników:</h2>
    <div id="score"></div>

</div>

<script src="script.js"></script>

</body>
</html>
